<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Red de Matemática — SLEP Andalién Sur</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#243882;--brand-mid:#4064AB;--brand-light:#9FB6DF;--brand-soft:#EDF1F8;
  --bg:#fff;--bg2:#f5f5f4;--bg3:#eeecea;
  --txt:#1a1a18;--txt2:#5f5e5a;--txt3:#888780;
  --bdr:rgba(0,0,0,0.12);--bdr2:rgba(0,0,0,0.22);
  --r:8px;--rl:12px;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  --green:#1D9E75;--green-bg:#e8f5ee;--amber:#BA7517;--amber-bg:#fef3dc;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
  --txt:#e8e6de;--txt2:#a8a69e;--txt3:#6e6d67;
  --bdr:rgba(255,255,255,0.1);--bdr2:rgba(255,255,255,0.2);
  --brand-soft:#1a2140;--green-bg:#0f2a1e;--amber-bg:#2a1f08;
}}
html,body{min-height:100%;font-family:var(--font-body);color:var(--txt);background:var(--bg3);font-size:14px;line-height:1.5}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:0.5px solid var(--bdr);background:var(--bg);position:sticky;top:0;z-index:100;gap:8px;height:58px;flex-wrap:wrap}
.nav-logos img{height:36px;width:auto;object-fit:contain}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:7px 13px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--txt2);transition:all .15s;display:flex;align-items:center;gap:5px;font-family:var(--font-body)}
.nav-tab:hover{background:var(--bg2);color:var(--txt)}
.nav-tab.active{background:var(--brand-soft);color:var(--brand)}
.nav-right{display:flex;align-items:center;gap:8px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#888;transition:background .3s;flex-shrink:0}
.sync-dot.ok{background:#1D9E75}.sync-dot.err{background:#E8593C}
.sync-dot.sync{background:#BA7517;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-btn{padding:7px 15px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;background:var(--brand);color:#fff;transition:opacity .15s;display:flex;align-items:center;gap:5px;font-family:var(--font-body)}
.nav-btn:hover{opacity:.88}
.nav-btn.sec{background:transparent;border:0.5px solid var(--bdr2);color:var(--txt)}
.nav-btn.sec:hover{background:var(--bg2)}

/* LAYOUT */
.main{max-width:980px;margin:0 auto;padding:24px 20px}
.view{display:none;animation:fadeIn .2s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.section-title{font-family:var(--font-head);font-weight:700;font-size:20px;color:var(--brand)}

/* LOADER */
#global-loader{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.9);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
@media(prefers-color-scheme:dark){#global-loader{background:rgba(28,28,26,0.9)}}
.spinner{width:36px;height:36px;border:3px solid var(--brand-soft);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SETUP BANNER */
.setup-banner{background:var(--brand-soft);border:0.5px solid var(--brand-light);border-radius:var(--rl);padding:16px 18px;margin-bottom:20px}
.setup-banner.hidden{display:none}
.setup-input{padding:8px 11px;border-radius:var(--r);border:0.5px solid var(--brand-light);background:var(--bg);color:var(--txt);font-size:13px;font-family:var(--font-body);width:100%;margin-top:4px}
.setup-input:focus{outline:none;border-color:var(--brand-mid)}

/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-planificada{background:var(--amber-bg);color:var(--amber)}
.badge-realizada{background:var(--green-bg);color:var(--green)}

/* CALENDAR */
.cal-nav-btn{width:34px;height:34px;border-radius:50%;border:0.5px solid var(--bdr2);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt2);transition:all .15s}
.cal-nav-btn:hover{background:var(--bg2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cal-day-name{text-align:center;font-size:11px;font-weight:600;color:var(--txt3);padding:5px 0;text-transform:uppercase;letter-spacing:.5px}
.cal-day{min-height:66px;border-radius:var(--r);border:0.5px solid var(--bdr);padding:5px 6px;background:var(--bg);transition:all .15s;cursor:default}
.cal-day.has-events{cursor:pointer}.cal-day.has-events:hover{border-color:var(--brand-light);background:var(--brand-soft)}
.cal-day.today{border-color:var(--brand-mid);background:var(--brand-soft)}
.cal-day.empty{border-color:transparent;background:transparent}
.cal-day-num{font-weight:500;font-size:12px;color:var(--txt2);margin-bottom:3px}
.cal-day.today .cal-day-num{color:var(--brand);font-weight:700}
.cal-dot{width:6px;height:6px;border-radius:50%;margin-bottom:2px}
.cal-dot-text{font-size:10px;color:var(--txt2);line-height:1.2;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 0 20px}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--txt2)}
.cal-legend-dot{width:9px;height:9px;border-radius:50%}
.upcoming-title{font-family:var(--font-head);font-weight:700;font-size:15px;color:var(--txt);margin-bottom:12px}
.event-card{display:flex;gap:12px;padding:12px 14px;border-radius:var(--rl);border:0.5px solid var(--bdr);background:var(--bg);margin-bottom:10px;cursor:pointer;transition:all .15s}
.event-card:hover{border-color:var(--brand-light);background:var(--brand-soft)}
.event-date-badge{min-width:44px;height:44px;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:700;text-transform:uppercase}
.event-meta{font-size:12px;color:var(--txt2);display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:3px}

/* BLOG */
.blog-filters{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.filter-pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--bdr2);background:var(--bg);color:var(--txt2);transition:all .15s;font-family:var(--font-body)}
.filter-pill:hover{border-color:var(--brand-light);color:var(--brand)}
.filter-pill.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.blog-card{border-radius:var(--rl);border:0.5px solid var(--bdr);background:var(--bg);overflow:hidden;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.blog-card:hover{border-color:var(--brand-light);transform:translateY(-2px)}
.blog-card-img{height:160px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;overflow:hidden;background:var(--bg2)}
.blog-card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.blog-card-img .img-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,0.35))}
.blog-card-img .tipo-badge{position:absolute;top:8px;right:8px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;z-index:1}
.blog-card-img .estado-badge{position:absolute;top:8px;left:8px;z-index:1}
.blog-card-body{padding:14px;flex:1;display:flex;flex-direction:column}
.blog-card-tags{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.blog-card-tag{padding:1px 8px;border-radius:20px;font-size:10px;background:var(--bg2);color:var(--txt2)}
.blog-card-title{font-family:var(--font-head);font-weight:700;font-size:15px;color:var(--txt);margin-bottom:6px;line-height:1.3}
.blog-card-excerpt{font-size:12px;color:var(--txt2);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.blog-card-footer{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--txt3);margin-top:auto}

/* GALLERY in detail */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin-bottom:14px}
.gallery-item{border-radius:var(--r);overflow:hidden;aspect-ratio:1;cursor:pointer;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--txt3);text-align:center;padding:4px;position:relative}
.gallery-item img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.gallery-item.pdf{background:var(--brand-soft);color:var(--brand);font-size:28px;flex-direction:column;gap:4px}
.gallery-item.video{background:#1a1a18;color:#fff;font-size:28px;flex-direction:column;gap:4px}
.gallery-item.doc{background:#e8f0fe;color:#1967d2;font-size:28px;flex-direction:column;gap:4px}
.gallery-item .file-label{font-size:10px;font-weight:500;z-index:1;text-align:center;padding:0 4px;line-height:1.2}
.pdf-viewer{width:100%;height:400px;border-radius:var(--r);border:0.5px solid var(--bdr);margin-bottom:12px}
.video-embed{width:100%;aspect-ratio:16/9;border-radius:var(--r);border:none;margin-bottom:12px}

/* ARCHIVOS INPUT */
.archivos-hint{font-size:11px;color:var(--txt3);margin-top:4px;line-height:1.5}
.archivos-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.archivo-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:var(--r);background:var(--bg2);font-size:12px}
.archivo-rm{background:none;border:none;cursor:pointer;color:var(--txt3);font-size:14px;margin-left:auto}

/* MODALS */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-backdrop.open{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--bdr2);width:100%;max-width:600px}
.modal-header{padding:16px 18px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:var(--font-head);font-weight:700;font-size:16px;color:var(--brand)}
.modal-close{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--bdr2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--txt2);font-size:16px}
.modal-close:hover{background:var(--bg2)}
.modal-body{padding:18px;max-height:75vh;overflow-y:auto}
.modal-footer{padding:14px 18px;border-top:0.5px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;font-weight:600;color:var(--txt2)}
.form-input{padding:8px 11px;border-radius:var(--r);border:0.5px solid var(--bdr2);background:var(--bg);color:var(--txt);font-size:13px;font-family:var(--font-body);width:100%;transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--brand-mid);box-shadow:0 0 0 3px rgba(64,100,171,.12)}
.form-input::placeholder{color:var(--txt3)}
select.form-input{cursor:pointer}
textarea.form-input{resize:vertical;min-height:70px}
.btn-primary{padding:9px 18px;border-radius:var(--r);border:none;background:var(--brand);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-body);display:inline-flex;align-items:center;gap:5px}
.btn-primary:hover{opacity:.88}
.btn-secondary{padding:9px 18px;border-radius:var(--r);border:0.5px solid var(--bdr2);background:transparent;color:var(--txt);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-body)}
.btn-secondary:hover{background:var(--bg2)}
.btn-green{padding:9px 18px;border-radius:var(--r);border:none;background:var(--green);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font-body);display:inline-flex;align-items:center;gap:5px}
.btn-green:hover{opacity:.88}
.success-msg{padding:11px 14px;background:var(--green-bg);color:#0f6e56;border-radius:var(--r);font-size:13px;margin-top:12px;display:none;align-items:center;gap:7px}
.success-msg.show{display:flex}
.empty-state{text-align:center;padding:40px 20px;color:var(--txt3);font-size:13px}
.empty-state i{font-size:36px;display:block;margin-bottom:10px;color:var(--brand-light)}

/* DETAIL */
.detail-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.detail-backdrop.open{display:flex}
.detail-modal{background:var(--bg);border-radius:var(--rl);width:100%;max-width:640px;max-height:92vh;overflow-y:auto}
.detail-hero{height:220px;position:relative;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:56px;border-radius:var(--rl) var(--rl) 0 0}
.detail-hero img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.detail-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.5))}
.detail-body{padding:20px}
.detail-meta{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 14px}
.meta-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;background:var(--bg2);color:var(--txt2)}
.detail-desc{font-size:14px;color:var(--txt);line-height:1.7;margin-bottom:16px}
.detail-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.field-item{padding:8px 12px;border-radius:var(--r);background:var(--bg2)}
.field-label{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.field-val{font-size:13px;color:var(--txt);font-weight:500}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;padding-top:12px;border-top:0.5px solid var(--bdr)}
.section-sep{font-family:var(--font-head);font-weight:700;font-size:13px;color:var(--txt);margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* ASISTENCIA */
.asist-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.asist-backdrop.open{display:flex}
.inscrito-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--r);border:0.5px solid var(--bdr);margin-bottom:6px;cursor:pointer;transition:all .15s;background:var(--bg)}
.inscrito-row:hover{background:var(--brand-soft);border-color:var(--brand-light)}
.inscrito-row.checked{background:var(--green-bg);border-color:var(--green)}
.inscrito-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--bdr2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:11px;color:transparent}
.inscrito-row.checked .inscrito-check{background:var(--green);border-color:var(--green);color:#fff}
.inscrito-info{flex:1}
.inscrito-nombre{font-weight:500;font-size:13px;color:var(--txt)}
.inscrito-estab{font-size:11px;color:var(--txt2)}
.search-box{padding:8px 11px;border-radius:var(--r);border:0.5px solid var(--bdr2);background:var(--bg);color:var(--txt);font-size:13px;font-family:var(--font-body);width:100%;margin-bottom:10px}
.search-box:focus{outline:none;border-color:var(--brand-mid)}
.asist-tabs{display:flex;gap:4px;margin-bottom:12px}
.asist-tab{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--bdr2);background:var(--bg);color:var(--txt2);font-family:var(--font-body)}
.asist-tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}

/* DASHBOARD */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:22px}
.metric-card{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--rl);padding:14px 16px}
.metric-val{font-family:var(--font-head);font-weight:800;font-size:28px;color:var(--brand);line-height:1}
.metric-lbl{font-size:11px;color:var(--txt2);margin-top:4px;line-height:1.4}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.chart-card{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--rl);padding:16px}
.chart-card.full{grid-column:1/-1}
.chart-title{font-weight:500;font-size:13px;color:var(--txt);margin-bottom:14px;display:flex;align-items:center;gap:5px}
.chart-title i{font-size:16px;color:var(--brand-mid)}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:11px;color:var(--txt2);min-width:92px;text-align:right;line-height:1.3}
.bar-track{flex:1;height:14px;background:var(--bg2);border-radius:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:20px;transition:width .7s ease}
.bar-val{font-size:11px;color:var(--txt2);min-width:28px;text-align:right;font-weight:500}
.pie-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pie-label{font-size:12px;color:var(--txt);flex:1}
.pie-pct{font-size:12px;font-weight:600;color:var(--txt2)}
.tl-item{display:flex;gap:12px;padding-bottom:14px;position:relative}
.tl-item:not(:last-child):before{content:'';position:absolute;left:16px;top:32px;bottom:0;width:0.5px;background:var(--bdr2)}
.tl-dot{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px}
.tl-body{flex:1;padding-top:4px}
.tl-title{font-weight:500;font-size:13px;color:var(--txt)}
.tl-meta{font-size:11px;color:var(--txt2);margin-top:1px}
.tl-stats{display:flex;gap:7px;margin-top:5px;flex-wrap:wrap}
.tl-stat{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg2);color:var(--txt2)}

/* PRINT */
@media print{body>*:not(#print-area){display:none!important}#print-area{display:block!important}}
#print-area{display:none;font-family:'DM Sans',sans-serif}
.print-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 14px;border-bottom:2px solid #243882}
.print-logos img{height:52px;width:auto}
.print-title-block{text-align:center;flex:1}
.print-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#243882}
.print-subtitle{font-size:13px;color:#5f5e5a;margin-top:2px}
.print-activity-info{padding:14px 24px;background:#EDF1F8;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;font-size:12px}
.print-info-item .label{font-weight:700;color:#243882;font-size:10px;text-transform:uppercase;letter-spacing:.4px}
.print-info-item .val{color:#1a1a18;margin-top:1px;font-size:13px}
.print-instructions{padding:10px 24px;font-size:11px;color:#5f5e5a;border-bottom:0.5px solid #ccc}
.print-table{width:100%;border-collapse:collapse;font-size:12px}
.print-table th{background:#243882;color:#fff;padding:8px 10px;text-align:left;font-weight:600;font-size:11px}
.print-table td{border-bottom:0.5px solid #ddd;padding:9px 10px;vertical-align:middle}
.print-table tr:nth-child(even) td{background:#f5f5f8}
.check-col{text-align:center;font-size:16px}
.sign-box{width:100%;height:28px;border-bottom:0.5px solid #999;display:block}
.print-footer{padding:14px 24px;border-top:2px solid #243882;display:flex;justify-content:space-between;font-size:10px;color:#888;margin-top:20px}

@media(max-width:600px){
  .charts-grid,.form-grid,.detail-fields{grid-template-columns:1fr}
  .form-group.full{grid-column:1}
  .nav-tab span{display:none}
  .blog-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- PRINT -->
<div id="print-area">
  <div class="print-header">
    <div class="print-logos"><img src="data:image/png;base64," alt="Red de Matemática"></div>
    <div class="print-title-block"><div class="print-title">Hoja de Asistencia</div><div class="print-subtitle">Red de Matemática — SLEP Andalién Sur</div></div>
    <div style="width:100px;text-align:right;font-size:11px;color:#888" id="p-date-print"></div>
  </div>
  <div class="print-activity-info" id="p-activity-info"></div>
  <div class="print-instructions">Complete con letra clara. Su firma certifica la participación.</div>
  <table class="print-table">
    <thead><tr>
      <th style="width:32px">N°</th>
      <th style="width:200px">Nombre completo</th>
      <th style="width:160px">Establecimiento</th>
      <th style="width:80px">Rol</th>
      <th style="width:40px;text-align:center">✓</th>
      <th>Firma</th>
    </tr></thead>
    <tbody id="p-rows"></tbody>
  </table>
  <div class="print-footer">
    <span id="p-footer-left">Red de Matemática · SLEP Andalién Sur</span>
    <span>Portal Red·Mat</span>
  </div>
</div>

<!-- LOADER -->
<div id="global-loader"><div class="spinner"></div><div style="font-size:13px;color:var(--brand);font-weight:500">Cargando datos...</div></div>

<!-- NAV -->
<div class="nav">
  <div class="nav-logos"><img src="data:image/png;base64," alt="Red de Matemática"></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="setView('cal',this)"><i class="ti ti-calendar"></i><span> Calendario</span></button>
    <button class="nav-tab" onclick="setView('blog',this)"><i class="ti ti-article"></i><span> Revista</span></button>
    <button class="nav-tab" onclick="setView('dash',this)"><i class="ti ti-chart-bar"></i><span> Impacto</span></button>
  </div>
  <div class="nav-right">
    <div style="display:flex;align-items:center;gap:5px"><div class="sync-dot" id="sync-dot"></div><span id="sync-label" style="font-size:11px;color:var(--txt3)">Conectando...</span></div>
    <button class="nav-btn sec" onclick="manualSync()" id="btn-refresh" title="Actualizar"><i class="ti ti-refresh"></i></button>
    <button class="nav-btn sec" onclick="openSetup()" title="Configuración"><i class="ti ti-settings"></i></button>
    <button class="nav-btn" onclick="openModal()"><i class="ti ti-plus"></i> Nueva actividad</button>
  </div>
</div>

<div class="main">

<!-- SETUP BANNER -->
<div class="setup-banner hidden" id="setup-banner">
  <div style="font-family:var(--font-head);font-weight:700;font-size:14px;color:var(--brand);margin-bottom:8px;display:flex;align-items:center;gap:6px"><i class="ti ti-plug-connected"></i> Conectar con Google Sheets</div>
  <p style="font-size:13px;color:var(--txt2);margin-bottom:10px">Pega la URL de tu Google Apps Script (Web App).</p>
  <input type="text" class="setup-input" id="script-url-input" placeholder="https://script.google.com/macros/s/.../exec">
  <div style="display:flex;gap:8px;margin-top:10px">
    <button class="btn-primary" onclick="connectScript()"><i class="ti ti-check"></i> Guardar y conectar</button>
    <button class="btn-secondary" onclick="closeSetup()">Cancelar</button>
  </div>
  <div id="setup-msg" style="font-size:12px;margin-top:8px;min-height:18px"></div>
</div>

<!-- CALENDAR VIEW -->
<div id="view-cal" class="view active">
  <div class="section-header">
    <div style="display:flex;align-items:center;gap:12px;width:100%">
      <div class="section-title" id="cal-month-title"></div>
      <div style="display:flex;gap:6px;margin-left:auto">
        <button class="cal-nav-btn" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
        <button class="cal-nav-btn" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-legend">
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#4064AB"></div>Taller docente</div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#E8593C"></div>Jornada de reflexión</div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#1D9E75"></div>Visita acompañamiento</div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#BA7517"></div>Encuentro Red</div>
    <div style="width:0.5px;height:14px;background:var(--bdr2)"></div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--amber);border:1.5px dashed var(--amber)"></div>Planificada</div>
    <div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--green)"></div>Realizada</div>
  </div>
  <div class="upcoming-title">Próximas actividades</div>
  <div id="upcoming-list"></div>
</div>

<!-- BLOG VIEW -->
<div id="view-blog" class="view">
  <div class="section-header">
    <div class="section-title">Revista de actividades</div>
    <span style="font-size:12px;color:var(--txt2)" id="blog-count"></span>
  </div>
  <div class="blog-filters" id="blog-filters">
    <button class="filter-pill active" onclick="filterBlog('all',this)">Todas</button>
    <button class="filter-pill" onclick="filterBlog('realizada',this)">✓ Realizadas</button>
    <button class="filter-pill" onclick="filterBlog('planificada',this)">Planificadas</button>
    <button class="filter-pill" onclick="filterBlog('Taller docente',this)">Taller docente</button>
    <button class="filter-pill" onclick="filterBlog('Jornada de reflexión',this)">Jornada</button>
    <button class="filter-pill" onclick="filterBlog('Visita acompañamiento',this)">Visita</button>
    <button class="filter-pill" onclick="filterBlog('Encuentro Red',this)">Encuentro Red</button>
  </div>
  <div class="blog-grid" id="blog-grid"></div>
</div>

<!-- DASHBOARD VIEW -->
<div id="view-dash" class="view">
  <div class="section-header">
    <div class="section-title">Panel de impacto</div>
    <span style="font-size:12px;color:var(--txt2)" id="last-sync-time"></span>
  </div>
  <div class="metric-grid" id="metric-grid"></div>
  <div class="charts-grid">
    <div class="chart-card"><div class="chart-title"><i class="ti ti-users"></i>Asistentes por tipo</div><div id="chart-tipo"></div></div>
    <div class="chart-card"><div class="chart-title"><i class="ti ti-building-community"></i>Cobertura por comunidad</div><div id="chart-comunidad"></div></div>
    <div class="chart-card"><div class="chart-title"><i class="ti ti-book"></i>Temáticas trabajadas</div><div id="chart-tematica"></div></div>
    <div class="chart-card"><div class="chart-title"><i class="ti ti-id-badge"></i>Por rol</div><div id="chart-rol"></div></div>
    <div class="chart-card full"><div class="chart-title"><i class="ti ti-timeline"></i>Actividades recientes</div><div id="dash-timeline"></div></div>
  </div>
</div>
</div>

<!-- MODAL NUEVA/EDITAR ACTIVIDAD -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title-txt">Registrar actividad</div>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="f-id">
      <div class="form-grid">
        <div class="form-group full"><label class="form-label">Nombre *</label><input type="text" class="form-input" id="f-nombre" placeholder="Ej. Taller resolución de problemas"></div>
        <div class="form-group"><label class="form-label">Fecha *</label><input type="date" class="form-input" id="f-fecha"></div>
        <div class="form-group"><label class="form-label">Estado</label>
          <select class="form-input" id="f-estado">
            <option value="planificada">📅 Planificada</option>
            <option value="realizada">✓ Realizada</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Tipo *</label>
          <select class="form-input" id="f-tipo">
            <option value="">Seleccionar...</option>
            <option>Taller docente</option><option>Jornada de reflexión</option>
            <option>Visita acompañamiento</option><option>Encuentro Red</option><option>Otro</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">N° asistentes *</label><input type="number" class="form-input" id="f-asistentes" placeholder="Ej. 24" min="0"></div>
        <div class="form-group"><label class="form-label">Rango etario</label>
          <select class="form-input" id="f-edad">
            <option value="">Seleccionar...</option>
            <option>20–30 años</option><option>31–40 años</option><option>41–50 años</option><option>51+ años</option><option>Mixto</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Comunidad</label><input type="text" class="form-input" id="f-comunidad" placeholder="Ej. Chiguayante, Florida"></div>
        <div class="form-group"><label class="form-label">Rol predominante</label>
          <select class="form-input" id="f-rol">
            <option value="">Seleccionar...</option>
            <option>Docente</option><option>Directivo</option><option>Dupla psicosocial</option><option>Asistente de educación</option><option>Mixto</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Área matemática</label>
          <select class="form-input" id="f-area">
            <option value="">Seleccionar...</option>
            <option>Números y operaciones</option><option>Álgebra y funciones</option><option>Geometría</option>
            <option>Probabilidad y estadística</option><option>Transversal / didáctica</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Temática</label><input type="text" class="form-input" id="f-tematica" placeholder="Ej. Resolución de problemas"></div>
        <div class="form-group full"><label class="form-label">Alianza institucional</label>
          <select class="form-input" id="f-alianza">
            <option value="">Sin alianza</option>
            <option>Matemáticas en Ruta (USACH)</option><option>Suma y Sigue (CMMEdu)</option><option>Universidad de Las Américas</option>
          </select>
        </div>
        <div class="form-group full"><label class="form-label">Descripción</label><textarea class="form-input" id="f-desc" placeholder="Resumen, logros, observaciones..."></textarea></div>
        <div class="form-group full" id="archivos-section">
          <label class="form-label">Archivos (links de Google Drive)</label>
          <div style="display:flex;gap:6px">
            <input type="text" class="form-input" id="f-archivo-url" placeholder="https://drive.google.com/...">
            <input type="text" class="form-input" id="f-archivo-nombre" placeholder="Nombre del archivo" style="max-width:160px">
            <button type="button" class="btn-primary" onclick="addArchivo()" style="white-space:nowrap;padding:8px 12px"><i class="ti ti-plus"></i></button>
          </div>
          <div class="archivos-hint">Sube el archivo a Google Drive, copia el link y pégalo aquí. Acepta imágenes, PDF, videos, Word, PPT y Excel.</div>
          <div class="archivos-list" id="archivos-list"></div>
        </div>
      </div>
      <div class="success-msg" id="success-msg"><i class="ti ti-circle-check"></i> <span id="success-txt">¡Actividad guardada!</span></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" id="save-btn" onclick="saveActivity()"><i class="ti ti-device-floppy"></i> Guardar</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="detail-backdrop" id="detail-backdrop" onclick="maybeCloseDetail(event)">
  <div class="detail-modal" id="detail-modal"></div>
</div>

<!-- ASISTENCIA MODAL -->
<div class="asist-backdrop" id="asist-backdrop">
  <div class="modal" style="max-width:660px">
    <div class="modal-header">
      <div class="modal-title"><i class="ti ti-clipboard-list" style="vertical-align:-2px;margin-right:6px"></i>Hoja de asistencia</div>
      <button class="modal-close" onclick="closeAsistencia()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div id="asist-activity-header" style="padding:10px 14px;background:var(--bg2);border-radius:var(--r);margin-bottom:14px;font-size:13px"></div>
      <div class="asist-tabs">
        <button class="asist-tab active" onclick="setAsistTab('inscritos',this)"><i class="ti ti-list-check" style="vertical-align:-1px"></i> Inscritos ({{COUNT}})</button>
        <button class="asist-tab" onclick="setAsistTab('manual',this)"><i class="ti ti-user-plus" style="vertical-align:-1px"></i> Agregar manual</button>
      </div>
      <!-- TAB INSCRITOS -->
      <div id="asist-tab-inscritos">
        <input type="text" class="search-box" id="asist-search" placeholder="Buscar por nombre o establecimiento..." oninput="renderInscritos()">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:12px;color:var(--txt2)" id="asist-checked-count">0 marcados</span>
          <button class="btn-secondary" style="padding:4px 10px;font-size:12px" onclick="clearAll()">Desmarcar todos</button>
        </div>
        <div id="inscritos-list" style="max-height:320px;overflow-y:auto"></div>
      </div>
      <!-- TAB MANUAL -->
      <div id="asist-tab-manual" style="display:none">
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
          <input type="text" id="asist-nombre" class="form-input" placeholder="Nombre completo" style="flex:2;min-width:140px">
          <input type="text" id="asist-rut" class="form-input" placeholder="RUT" style="flex:1;min-width:90px">
          <input type="text" id="asist-estab" class="form-input" placeholder="Establecimiento" style="flex:2;min-width:120px">
          <select id="asist-rol-m" class="form-input" style="flex:1;min-width:100px">
            <option value="">Rol</option><option>Docente</option><option>Directivo</option><option>Dupla psicosocial</option><option>Asistente</option><option>Otro</option>
          </select>
          <button class="btn-primary" onclick="addManual()"><i class="ti ti-user-plus"></i> Agregar</button>
        </div>
        <div id="manual-list"></div>
      </div>
    </div>
    <div class="modal-footer" style="justify-content:space-between">
      <span style="font-size:12px;color:var(--txt2)" id="asist-total-count">0 participantes</span>
      <div style="display:flex;gap:8px">
        <button class="btn-secondary" onclick="closeAsistencia()">Cerrar</button>
        <button class="btn-primary" onclick="printAsistencia()"><i class="ti ti-printer"></i> Imprimir / PDF</button>
      </div>
    </div>
  </div>
</div>

<script>
