// ── DATE ──────────────────────────────────────────────────────
function normalizeDate(val){
  if(!val)return '';
  const s=String(val).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  const d=new Date(s);
  if(!isNaN(d))return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const dmy=s.match(/^(\d{1,2})[/\-](\d{1,2})[/\-](\d{4})$/);
  if(dmy)return dmy[3]+'-'+dmy[2].padStart(2,'0')+'-'+dmy[1].padStart(2,'0');
  return s;
}
function fmtDate(f){const d=new Date(normalizeDate(f)+'T12:00:00');return`${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;}

// ── API ───────────────────────────────────────────────────────
const API='/api';
function getScriptUrl(){return API;}

async function apiGet(){
  const res=await fetch(API+'?action=getAll');
  if(!res.ok)throw new Error('HTTP '+res.status);
  return res.json();
}

async function apiPost(body){
  const res=await fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!res.ok)throw new Error('HTTP '+res.status);
  return res.json();
}

// ── STATUS ────────────────────────────────────────────────────
function setStatus(s,msg){
  const dot=document.getElementById('sync-dot');
  const lbl=document.getElementById('sync-label');
  const m={ok:['ok','Sincronizado'],sync:['sync','Guardando...'],err:['err','Error'],local:['','Sin conexión']};
  const[cls,def]=m[s]||m.local;
  dot.className='sync-dot'+(cls?' '+cls:'');
  lbl.textContent=msg||def;
}
function showLoader(v){document.getElementById('global-loader').style.display=v?'flex':'none';}

// ── LOAD ──────────────────────────────────────────────────────
async function loadAll(spinner=true){
  if(!getScriptUrl()){setStatus('local');return;}
  if(spinner)showLoader(true);
  setStatus('sync');
  try{
    const data=await apiGet();
    if(data&&Array.isArray(data.activities)){
      activities=data.activities.map(a=>({
        ...a,
        fecha:normalizeDate(a.fecha),
        archivos:Array.isArray(a.archivos)?a.archivos:(typeof a.archivos==='string'&&a.archivos?JSON.parse(a.archivos):[]),
        participantes:Array.isArray(a.participantes)?a.participantes:(typeof a.participantes==='string'&&a.participantes?JSON.parse(a.participantes):[])
      }));
      const ts=new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
      setStatus('ok','Actualizado '+ts);
      const el=document.getElementById('last-sync-time');if(el)el.textContent='Actualizado '+ts;
    }
  }catch(e){
    setStatus('err','Error al conectar');
    console.warn(e);
    if(spinner){showLoader(false);renderCurrent();openSetup();return;}
  }
  finally{if(spinner)showLoader(false);renderCurrent();}
}
function renderCurrent(){
  if(currentView==='cal')renderCal();
  else if(currentView==='blog')renderBlog(blogFilter);
  else if(currentView==='dash')renderDash();
}

// ── NAVIGATION ────────────────────────────────────────────────
async function setView(v,el){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  el.classList.add('active');currentView=v;
  await loadAll(false);
}
async function manualSync(){
  const b=document.getElementById('btn-refresh');
  if(b){b.style.opacity='.4';b.style.pointerEvents='none';}
  await loadAll(false);
  if(b){b.style.opacity='';b.style.pointerEvents='';}
}

// ── SETUP ─────────────────────────────────────────────────────
function openSetup(){document.getElementById('setup-banner').classList.remove('hidden');document.getElementById('script-url-input').value=getScriptUrl();document.getElementById('setup-msg').textContent='';}
function closeSetup(){document.getElementById('setup-banner').classList.add('hidden');}
async function connectScript(){
  const url=document.getElementById('script-url-input').value.trim();
  const msg=document.getElementById('setup-msg');
  if(!url){msg.textContent='⚠ Pega la URL.';msg.style.color='#E8593C';return;}
  msg.textContent='Probando...';msg.style.color='#243882';
  try{
    const res=await fetch(url+'?action=getAll');const data=await res.json();
    if('activities'in data){
      localStorage.setItem(SCRIPT_URL_KEY,url);
      msg.textContent='✓ Conectado.';msg.style.color='#1D9E75';
      setTimeout(()=>{closeSetup();loadAll();},800);
    }else{msg.textContent='✗ No responde correctamente.';msg.style.color='#E8593C';}
  }catch(e){msg.textContent='✗ Error: '+e.message;msg.style.color='#E8593C';}
}

// ── CALENDAR ─────────────────────────────────────────────────
function changeMonth(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function renderCal(){
  document.getElementById('cal-month-title').textContent=MONTHS[calMonth]+' '+calYear;
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].forEach(d=>{const el=document.createElement('div');el.className='cal-day-name';el.textContent=d;grid.appendChild(el);});
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const offset=first===0?6:first-1;
  for(let i=0;i<offset;i++){const el=document.createElement('div');el.className='cal-day empty';grid.appendChild(el);}
  const today=new Date();
  for(let d=1;d<=days;d++){
    const el=document.createElement('div');el.className='cal-day';
    if(d===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear())el.classList.add('today');
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const da=activities.filter(a=>normalizeDate(a.fecha)===ds);
    const num=document.createElement('div');num.className='cal-day-num';num.textContent=d;el.appendChild(num);
    da.slice(0,2).forEach(a=>{
      const color=COLORS[a.tipo]||'#888';
      const isReal=a.estado==='realizada';
      const dot=document.createElement('div');dot.className='cal-dot';
      dot.style.background=isReal?color:'transparent';
      dot.style.border=isReal?'none':'1.5px dashed '+color;
      el.appendChild(dot);
      const txt=document.createElement('div');txt.className='cal-dot-text';txt.textContent=a.nombre;el.appendChild(txt);
    });
    if(da.length){el.classList.add('has-events');el.onclick=()=>openDetail(da[0].id);}
    grid.appendChild(el);
  }
  const ul=document.getElementById('upcoming-list');ul.innerHTML='';
  const now=new Date();now.setHours(0,0,0,0);
  const fut=activities.filter(a=>new Date(normalizeDate(a.fecha)+'T12:00:00')>=now).sort((a,b)=>normalizeDate(a.fecha).localeCompare(normalizeDate(b.fecha))).slice(0,5);
  if(!fut.length){ul.innerHTML='<div class="empty-state"><i class="ti ti-calendar-off"></i>No hay actividades próximas.</div>';return;}
  fut.forEach(a=>{
    const d=new Date(normalizeDate(a.fecha)+'T12:00:00');
    const color=COLORS[a.tipo]||'#888';const bg=color+'22';
    const isReal=a.estado==='realizada';
    const card=document.createElement('div');card.className='event-card';card.onclick=()=>openDetail(a.id);
    card.innerHTML=`<div class="event-date-badge" style="background:${bg};color:${color}"><span style="font-size:18px;font-weight:800;line-height:1">${d.getDate()}</span><span>${MONTHS_SHORT[d.getMonth()].toUpperCase()}</span></div><div style="flex:1"><div style="font-weight:500;font-size:14px;color:var(--txt);margin-bottom:3px;display:flex;align-items:center;gap:6px">${a.nombre}<span class="badge ${isReal?'badge-realizada':'badge-planificada'}">${isReal?'✓ Realizada':'📅 Planificada'}</span></div><div class="event-meta"><span><i class="ti ti-map-pin"></i>${a.comunidad||'—'}</span><span><i class="ti ti-users"></i>${a.asistentes}</span><span style="padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;background:${bg};color:${color}">${a.tipo}</span></div></div>`;
    ul.appendChild(card);
  });
}

// ── BLOG ─────────────────────────────────────────────────────
function filterBlog(f,el){blogFilter=f;document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');renderBlog(f);}
function getFirstImage(archivos){
  if(!Array.isArray(archivos))return null;
  const img=archivos.find(a=>a.tipo==='imagen'||/\.(jpg|jpeg|png|gif|webp)/i.test(a.url||a.nombre||'')||/drive\.google\.com.*thumbnail/.test(a.url||'')||/uc\?/.test(a.url||'')||getArchivoTipo(a)==='imagen');
  return img||null;
}
function getDriveDirectUrl(url){
  if(!url)return url;
  // Convert share URL to direct/thumbnail URL
  const m1=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  const m2=url.match(/id=([a-zA-Z0-9_-]+)/);
  const id=m1?m1[1]:m2?m2[1]:null;
  if(id)return`https://drive.google.com/thumbnail?id=${id}&sz=w400`;
  return url;
}
function getArchivoTipo(a){
  const url=(a.url||a.nombre||a.link||a.href||String(a)||'').toLowerCase();
  if(/\.(jpg|jpeg|png|gif|webp)/.test(url)||/thumbnail|uc\?id/.test(url)||a.tipo==='imagen')return'imagen';
  if(/\.pdf/.test(url)||/export=pdf/.test(url)||a.tipo==='pdf')return'pdf';
  if(/youtube\.com|youtu\.be|vimeo/.test(url)||/\.(mp4|webm|mov)/.test(url)||a.tipo==='video')return'video';
  if(/\.(doc|docx)/.test(url)||a.tipo==='word')return'word';
  if(/\.(ppt|pptx)/.test(url)||a.tipo==='ppt')return'ppt';
  if(/\.(xls|xlsx)/.test(url)||a.tipo==='excel')return'excel';
  return'link';
}

function renderBlog(f){
  let filtered=[...activities];
  if(f==='realizada')filtered=filtered.filter(a=>a.estado==='realizada');
  else if(f==='planificada')filtered=filtered.filter(a=>a.estado!=='realizada');
  else if(f!=='all')filtered=filtered.filter(a=>a.tipo===f);
  document.getElementById('blog-count').textContent=filtered.length+' registro'+(filtered.length!==1?'s':'');
  const grid=document.getElementById('blog-grid');grid.innerHTML='';
  if(!filtered.length){grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><i class="ti ti-folder-off"></i>Sin actividades en esta categoría.</div>';return;}
  filtered.sort((a,b)=>normalizeDate(b.fecha).localeCompare(normalizeDate(a.fecha))).forEach(a=>{
    const color=COLORS[a.tipo]||'#888';const bg=color+'18';
    const isReal=a.estado==='realizada';
    const archivos=Array.isArray(a.archivos)?a.archivos:[];
    const firstImg=archivos.find(ar=>getArchivoTipo(ar)==='imagen');
    const imgUrl=firstImg?getDriveDirectUrl(firstImg.url||firstImg.link||firstImg):null;
    const pCount=(a.participantes||[]).length+(Object.keys(asistChecked).length);
    const card=document.createElement('div');card.className='blog-card';card.onclick=()=>openDetail(a.id);
    const imgContent=imgUrl
      ?`<img src="${imgUrl}" alt="Imagen de la actividad" onerror="this.style.display='none'">`
      :`<span style="font-size:44px">${isReal?'📸':'📅'}</span>`;
    card.innerHTML=`
      <div class="blog-card-img" style="${imgUrl?'':`background:${bg}`}">
        ${imgContent}
        ${imgUrl?'<div class="img-overlay"></div>':''}
        <span class="tipo-badge" style="background:${color}22;color:${color}">${a.tipo}</span>
        <span class="estado-badge"><span class="badge ${isReal?'badge-realizada':'badge-planificada'}">${isReal?'✓ Realizada':'📅 Plan.'}</span></span>
      </div>
      <div class="blog-card-body">
        <div class="blog-card-tags">
          ${a.alianza?`<span class="blog-card-tag">${a.alianza.split('(')[0].trim()}</span>`:''}
          ${a.area?`<span class="blog-card-tag">${a.area}</span>`:''}
          ${archivos.length?`<span class="blog-card-tag"><i class="ti ti-paperclip" style="vertical-align:-1px"></i> ${archivos.length} archivo${archivos.length>1?'s':''}</span>`:''}
        </div>
        <div class="blog-card-title">${a.nombre}</div>
        <div class="blog-card-excerpt">${a.desc||'Sin descripción.'}</div>
        <div class="blog-card-footer">
          <span>${fmtDate(a.fecha)} · ${a.comunidad||'—'}</span>
          <div style="display:flex;gap:6px">
            <span style="display:flex;align-items:center;gap:3px"><i class="ti ti-users"></i>${a.asistentes}</span>
            ${pCount?`<span style="display:flex;align-items:center;gap:3px;color:var(--green)"><i class="ti ti-clipboard-check"></i>${pCount}</span>`:''}
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

// ── DETAIL ────────────────────────────────────────────────────
function openDetail(id){
  const a=activities.find(x=>String(x.id)===String(id));if(!a)return;
  const color=COLORS[a.tipo]||'#888';const bg=color+'18';
  const isReal=a.estado==='realizada';
  const archivos=Array.isArray(a.archivos)?a.archivos:[];
  const firstImg=archivos.find(ar=>getArchivoTipo(ar)==='imagen');
  const imgUrl=firstImg?getDriveDirectUrl(firstImg.url||firstImg.link||firstImg):null;
  const pCount=(a.participantes||[]).length;

  // Build media gallery
  let mediaHtml='';
  if(archivos.length){
    mediaHtml=`<div class="section-sep"><i class="ti ti-paperclip"></i>Archivos adjuntos</div><div class="gallery">`;
    archivos.forEach(ar=>{
      const tipo=getArchivoTipo(ar);
      const rawUrl=ar.url||ar.link||ar;
      const nombre=ar.nombre||'Archivo';
      const m1=(rawUrl.match(/\/d\/([a-zA-Z0-9_-]+)/)||[]);
      const m2=(rawUrl.match(/id=([a-zA-Z0-9_-]+)/)||[]);
      const driveId=m1[1]||m2[1]||null;
      if(tipo==='imagen'){
        const thumb=driveId?`https://drive.google.com/thumbnail?id=${driveId}&sz=w400`:rawUrl;
        mediaHtml+=`<div class="gallery-item" onclick="window.open('${rawUrl}','_blank')"><img src="${thumb}" alt="${nombre}" onerror="this.parentElement.innerHTML='<i class=ti ti-photo style=font-size:28px></i><div class=file-label>${nombre}</div>'"></div>`;
      }else if(tipo==='pdf'){
        const viewUrl=driveId?`https://drive.google.com/file/d/${driveId}/preview`:rawUrl;
        mediaHtml+=`<div class="gallery-item pdf" onclick="openFileViewer('${viewUrl}','pdf','${nombre}')"><i class="ti ti-file-type-pdf" style="font-size:28px"></i><div class="file-label">${nombre}</div></div>`;
      }else if(tipo==='video'){
        let embedUrl=rawUrl;
        const yt=rawUrl.match(/(?:youtu\.be\/|v=)([a-zA-Z0-9_-]{11})/);
        if(yt)embedUrl=`https://www.youtube.com/embed/${yt[1]}`;
        else if(driveId)embedUrl=`https://drive.google.com/file/d/${driveId}/preview`;
        mediaHtml+=`<div class="gallery-item video" onclick="openFileViewer('${embedUrl}','video','${nombre}')"><i class="ti ti-player-play" style="font-size:28px"></i><div class="file-label">${nombre}</div></div>`;
      }else{
        const icons={word:'ti-file-type-doc',ppt:'ti-presentation',excel:'ti-file-type-xls',link:'ti-link'};
        const icon=icons[tipo]||'ti-file';
        mediaHtml+=`<div class="gallery-item doc" onclick="window.open('${rawUrl}','_blank')"><i class="ti ${icon}" style="font-size:26px"></i><div class="file-label">${nombre}</div></div>`;
      }
    });
    mediaHtml+='</div>';
  }

  document.getElementById('detail-modal').innerHTML=`
    <div class="detail-hero" style="${imgUrl?'':`background:${bg}`}">
      ${imgUrl?`<img src="${imgUrl}" alt="Portada">`:`<span style="font-size:56px">${isReal?'📸':'📅'}</span>`}
      ${imgUrl?'<div class="detail-hero-overlay"></div>':''}
    </div>
    <div class="detail-body">
      <div style="display:flex;align-items:start;justify-content:space-between;gap:8px">
        <div>
          <h2 style="font-family:var(--font-head);font-weight:700;font-size:18px;color:var(--brand);margin-bottom:6px">${a.nombre}</h2>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <span style="padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;background:${color}22;color:${color}">${a.tipo}</span>
            <span class="badge ${isReal?'badge-realizada':'badge-planificada'}">${isReal?'✓ Realizada':'📅 Planificada'}</span>
          </div>
        </div>
        <button onclick="closeDetail()" style="background:none;border:none;cursor:pointer;color:var(--txt2);font-size:20px;padding:4px;flex-shrink:0"><i class="ti ti-x"></i></button>
      </div>
      <div class="detail-meta">
        <span class="meta-chip"><i class="ti ti-calendar"></i>${fmtDate(a.fecha)}</span>
        <span class="meta-chip"><i class="ti ti-users"></i>${a.asistentes} asistentes</span>
        ${a.comunidad?`<span class="meta-chip"><i class="ti ti-map-pin"></i>${a.comunidad}</span>`:''}
        ${pCount?`<span class="meta-chip" style="background:var(--green-bg);color:var(--green)"><i class="ti ti-clipboard-check"></i>${pCount} en lista</span>`:''}
      </div>
      <p class="detail-desc">${a.desc||'Sin descripción.'}</p>
      <div class="detail-fields">
        <div class="field-item"><div class="field-label">Rol</div><div class="field-val">${a.rol||'—'}</div></div>
        <div class="field-item"><div class="field-label">Rango etario</div><div class="field-val">${a.edad||'—'}</div></div>
        <div class="field-item"><div class="field-label">Área</div><div class="field-val">${a.area||'—'}</div></div>
        <div class="field-item"><div class="field-label">Temática</div><div class="field-val">${a.tematica||'—'}</div></div>
        ${a.alianza?`<div class="field-item" style="grid-column:1/-1"><div class="field-label">Alianza</div><div class="field-val">${a.alianza}</div></div>`:''}
      </div>
      ${mediaHtml}
      <div class="detail-actions">
        <button class="btn-primary" onclick="closeDetail();openAsistencia('${a.id}')"><i class="ti ti-clipboard-list"></i> Asistencia</button>
        <button class="btn-secondary" onclick="closeDetail();openEditModal('${a.id}')"><i class="ti ti-edit"></i> Editar</button>
        <button class="btn-secondary" onclick="closeDetail();deleteActivity('${a.id}')"><i class="ti ti-trash"></i> Eliminar</button>
      </div>
    </div>`;
  document.getElementById('detail-backdrop').classList.add('open');
}
function closeDetail(){document.getElementById('detail-backdrop').classList.remove('open');}
function maybeCloseDetail(e){if(e.target===document.getElementById('detail-backdrop'))closeDetail();}

// File viewer lightbox
function openFileViewer(url,tipo,nombre){
  const existing=document.getElementById('file-viewer-modal');
  if(existing)existing.remove();
  const div=document.createElement('div');
  div.id='file-viewer-modal';
  div.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px';
  div.onclick=e=>{if(e.target===div)div.remove();};
  const close=`<button onclick="document.getElementById('file-viewer-modal').remove()" style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center"><i class="ti ti-x"></i></button>`;
  const title=`<div style="color:#fff;font-size:14px;font-weight:500;margin-bottom:12px;font-family:var(--font-head)">${nombre}</div>`;
  let content='';
  if(tipo==='pdf'||tipo==='video'){
    content=`<iframe src="${url}" style="width:min(860px,90vw);height:min(560px,80vh);border:none;border-radius:var(--rl)"></iframe>`;
  }
  div.innerHTML=close+title+content;
  document.body.appendChild(div);
}

// ── DELETE ────────────────────────────────────────────────────
async function deleteActivity(id){
  if(!confirm('¿Eliminar esta actividad?'))return;
  setStatus('sync');
  try{await apiPost({action:'delete',id});activities=activities.filter(a=>String(a.id)!==String(id));setStatus('ok');}
  catch(e){setStatus('err','Error al eliminar');}
  renderCurrent();
}

// ── MODAL NUEVA/EDITAR ────────────────────────────────────────
function openModal(){
  editingId=null;editingArchivos=[];
  document.getElementById('modal-title-txt').textContent='Registrar actividad';
  document.getElementById('f-id').value='';
  document.getElementById('f-fecha').value=new Date().toISOString().split('T')[0];
  document.getElementById('f-estado').value='planificada';
  ['f-nombre','f-tipo','f-asistentes','f-edad','f-comunidad','f-rol','f-area','f-tematica','f-alianza','f-desc'].forEach(id=>{
    const el=document.getElementById(id);if(el.tagName==='SELECT')el.selectedIndex=0;else el.value='';
  });
  document.getElementById('success-msg').classList.remove('show');
  renderArchivosList();
  document.getElementById('modal-backdrop').classList.add('open');
}
function openEditModal(id){
  const a=activities.find(x=>String(x.id)===String(id));if(!a)return;
  editingId=id;editingArchivos=[...(a.archivos||[])];
  document.getElementById('modal-title-txt').textContent='Editar actividad';
  document.getElementById('f-id').value=id;
  document.getElementById('f-nombre').value=a.nombre||''
  document.getElementById('f-fecha').value=normalizeDate(a.fecha);
  document.getElementById('f-estado').value=a.estado||'planificada';
  document.getElementById('f-tipo').value=a.tipo||''
  document.getElementById('f-asistentes').value=a.asistentes||0;
  document.getElementById('f-edad').value=a.edad||''
  document.getElementById('f-comunidad').value=a.comunidad||''
  document.getElementById('f-rol').value=a.rol||''
  document.getElementById('f-area').value=a.area||''
  document.getElementById('f-tematica').value=a.tematica||''
  document.getElementById('f-alianza').value=a.alianza||''
  document.getElementById('f-desc').value=a.desc||''
  document.getElementById('success-msg').classList.remove('show');
  renderArchivosList();
  document.getElementById('modal-backdrop').classList.add('open');
}
function closeModal(){document.getElementById('modal-backdrop').classList.remove('open');editingId=null;editingArchivos=[];}

// Archivos management
function addArchivo(){
  const url=document.getElementById('f-archivo-url').value.trim();
  const nombre=document.getElementById('f-archivo-nombre').value.trim()||'Archivo';
  if(!url)return;
  editingArchivos.push({url,nombre,tipo:getArchivoTipo({url,nombre})});
  document.getElementById('f-archivo-url').value='';
  document.getElementById('f-archivo-nombre').value='';
  renderArchivosList();
}
function removeArchivo(i){editingArchivos.splice(i,1);renderArchivosList();}
function renderArchivosList(){
  const list=document.getElementById('archivos-list');
  const iconMap={imagen:'ti-photo',pdf:'ti-file-type-pdf',video:'ti-player-play',word:'ti-file-type-doc',ppt:'ti-presentation',excel:'ti-file-type-xls',link:'ti-link'};
  list.innerHTML=editingArchivos.map((a,i)=>{
    const tipo=getArchivoTipo(a);const icon=iconMap[tipo]||'ti-file';
    return`<div class="archivo-item"><i class="ti ${icon}" style="color:var(--brand-mid)"></i><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.nombre||a.url}</span><button class="archivo-rm" onclick="removeArchivo(${i})"><i class="ti ti-x"></i></button></div>`;
  }).join('');
}

async function saveActivity(){
  const nombre=document.getElementById('f-nombre').value.trim();
  const fecha=document.getElementById('f-fecha').value;
  const tipo=document.getElementById('f-tipo').value;
  const asist=document.getElementById('f-asistentes').value;
  if(!nombre||!fecha||!tipo){alert('Completa los campos obligatorios (*)');return;}
  const act={
    id:editingId||Date.now(),nombre,fecha,
    estado:document.getElementById('f-estado').value||'planificada',
    tipo,asistentes:parseInt(asist)||0,
    edad:document.getElementById('f-edad').value||'Mixto',
    comunidad:document.getElementById('f-comunidad').value.trim()||'Concepción',
    rol:document.getElementById('f-rol').value||'Docente',
    area:document.getElementById('f-area').value||'Transversal / didáctica',
    tematica:document.getElementById('f-tematica').value.trim()||'Sin especificar',
    alianza:document.getElementById('f-alianza').value||'',
    desc:document.getElementById('f-desc').value.trim()||'',
    archivos:editingArchivos,
    participantes:editingId?(activities.find(a=>String(a.id)===String(editingId))||{}).participantes||[]:[]
  };
  const btn=document.getElementById('save-btn');btn.disabled=true;btn.style.opacity='.6';
  setStatus('sync');
  try{
    await apiPost({action:'save',activity:act});
    if(editingId){const i=activities.findIndex(a=>String(a.id)===String(editingId));if(i>-1)activities[i]=act;}
    else activities.push(act);
    setStatus('ok');
    document.getElementById('success-txt').textContent=editingId?'¡Actividad actualizada!':'¡Actividad guardada!';
    document.getElementById('success-msg').classList.add('show');
    setTimeout(()=>{closeModal();renderCurrent();},1200);
  }catch(e){setStatus('err','Error al guardar');alert('No se pudo guardar. Verifica la conexión.');}
  finally{btn.disabled=false;btn.style.opacity='';}
}

// ── ASISTENCIA ────────────────────────────────────────────────
let currentAsistTab='inscritos';
function setAsistTab(tab,el){
  currentAsistTab=tab;
  document.querySelectorAll('.asist-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('asist-tab-inscritos').style.display=tab==='inscritos'?'block':'none';
  document.getElementById('asist-tab-manual').style.display=tab==='manual'?'block':'none';
}

function openAsistencia(id){
  const a=activities.find(x=>String(x.id)===String(id));if(!a)return;
  currentAsistActivity=a;
  // Init checked state from saved participants
  asistChecked={};
  manualParticipants=[...(a.participantes||[]).filter(p=>p.manual)];
  (a.participantes||[]).filter(p=>!p.manual).forEach(p=>{if(p.correo)asistChecked[p.correo]=true;else if(p.nombre)asistChecked['n:'+p.nombre]=true;});
  const color=COLORS[a.tipo]||'#888';
  document.getElementById('asist-activity-header').innerHTML=`<strong style="color:${color}">${a.tipo}</strong> · ${a.nombre} · ${fmtDate(a.fecha)} · ${a.comunidad||'—'}`;
  // Update tab count
  document.querySelector('.asist-tab').innerHTML=`<i class="ti ti-list-check" style="vertical-align:-1px"></i> Inscritos (${INSCRITOS_BASE.length})`;
  document.getElementById('asist-search').value='';
  renderInscritos();renderManualList();updateAsistCount();
  document.getElementById('asist-backdrop').classList.add('open');
}
function closeAsistencia(){document.getElementById('asist-backdrop').classList.remove('open');currentAsistActivity=null;}

function renderInscritos(){
  const q=(document.getElementById('asist-search').value||'').toLowerCase();
  const filtered=INSCRITOS_BASE.filter(p=>(p.nombre+p.establecimiento).toLowerCase().includes(q));
  const list=document.getElementById('inscritos-list');
  list.innerHTML=filtered.map((p,i)=>{
    const key=p.correo||'n:'+p.nombre;
    const checked=!!asistChecked[key];
    const origIdx=INSCRITOS_BASE.indexOf(p);
    return`<div class="inscrito-row${checked?' checked':''}" onclick="toggleInscritoByIdx(${origIdx})">
      <div class="inscrito-check">${checked?'<i class="ti ti-check"></i>':'' }</div>
      <div class="inscrito-info"><div class="inscrito-nombre">${p.nombre}</div><div class="inscrito-estab">${p.establecimiento}</div></div>
    </div>`;
  }).join('');
}

function toggleInscritoByIdx(idx){
  const p=INSCRITOS_BASE[idx];
  if(!p)return;
  const key=p.correo||'n:'+p.nombre;
  asistChecked[key]=!asistChecked[key];
  renderInscritos();updateAsistCount();
  saveParticipantsDebounced();
}
function clearAll(){asistChecked={};renderInscritos();updateAsistCount();saveParticipantsDebounced();}

function updateAsistCount(){
  const nChecked=Object.values(asistChecked).filter(Boolean).length;
  const total=nChecked+manualParticipants.length;
  document.getElementById('asist-checked-count').textContent=nChecked+' marcados';
  document.getElementById('asist-total-count').textContent=total+' participante'+(total!==1?'s':'');
}

function addManual(){
  const nombre=document.getElementById('asist-nombre').value.trim();
  if(!nombre){alert('Ingresa al menos el nombre.');return;}
  manualParticipants.push({nombre,rut:document.getElementById('asist-rut').value.trim(),estab:document.getElementById('asist-estab').value.trim(),rol:document.getElementById('asist-rol-m').value||'Docente',manual:true});
  ['asist-nombre','asist-rut','asist-estab'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('asist-rol-m').selectedIndex=0;
  renderManualList();updateAsistCount();saveParticipantsDebounced();
}
function removeManual(i){manualParticipants.splice(i,1);renderManualList();updateAsistCount();saveParticipantsDebounced();}
function renderManualList(){
  const list=document.getElementById('manual-list');
  if(!manualParticipants.length){list.innerHTML='<div style="font-size:12px;color:var(--txt3);padding:8px 0">Sin participantes manuales agregados.</div>';return;}
  list.innerHTML=manualParticipants.map((p,i)=>`<div class="archivo-item"><i class="ti ti-user" style="color:var(--brand-mid)"></i><span style="flex:1">${p.nombre} · ${p.estab||'—'} · ${p.rol}</span><button class="archivo-rm" onclick="removeManual(${i})"><i class="ti ti-x"></i></button></div>`).join('');
}

let saveDebounceTimer=null;
function saveParticipantsDebounced(){
  clearTimeout(saveDebounceTimer);
  saveDebounceTimer=setTimeout(()=>saveParticipants(),800);
}

async function saveParticipants(){
  if(!currentAsistActivity)return;
  const inscritosChecked=INSCRITOS_BASE.filter(p=>{const key=p.correo||'n:'+p.nombre;return asistChecked[key];}).map(p=>({...p,manual:false}));
  const allParticipants=[...inscritosChecked,...manualParticipants];
  const idx=activities.findIndex(a=>String(a.id)===String(currentAsistActivity.id));
  if(idx>-1)activities[idx].participantes=allParticipants;
  try{await apiPost({action:'updateParticipants',id:currentAsistActivity.id,participantes:allParticipants});}
  catch(e){console.warn('Error guardando participantes:',e);}
}

function printAsistencia(){
  const a=currentAsistActivity;if(!a)return;
  // Compile full list
  const inscritosChecked=INSCRITOS_BASE.filter(p=>{const key=p.correo||'n:'+p.nombre;return asistChecked[key];});
  const all=[...inscritosChecked,...manualParticipants];
  const d=new Date(normalizeDate(a.fecha)+'T12:00:00');
  document.getElementById('p-date-print').textContent=d.toLocaleDateString('es-CL',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('p-activity-info').innerHTML=`
    <div class="print-info-item"><div class="label">Actividad</div><div class="val">${a.nombre}</div></div>
    <div class="print-info-item"><div class="label">Tipo</div><div class="val">${a.tipo}</div></div>
    <div class="print-info-item"><div class="label">Comunidad</div><div class="val">${a.comunidad||'—'}</div></div>
    <div class="print-info-item"><div class="label">Área</div><div class="val">${a.area||'—'}</div></div>
    <div class="print-info-item"><div class="label">Temática</div><div class="val">${a.tematica||'—'}</div></div>
    <div class="print-info-item"><div class="label">Fecha</div><div class="val">${fmtDate(a.fecha)}</div></div>`;
  const ROWS=Math.max(all.length+5,25);
  const tbody=document.getElementById('p-rows');tbody.innerHTML='';
  for(let i=0;i<ROWS;i++){
    const p=all[i]||null;const tr=document.createElement('tr');
    const checked=p?'☑':'☐';
    tr.innerHTML=`<td>${i+1}</td><td>${p?p.nombre:''}</td><td>${p?(p.establecimiento||p.estab||''): ''}</td><td>${p?p.rol||'Docente':''}</td><td class="check-col">${p?checked:'☐'}</td><td><div class="sign-box"></div></td>`;
    tbody.appendChild(tr);
  }
  document.getElementById('p-footer-left').textContent=`Red de Matemática · SLEP Andalién Sur · ${a.nombre} · ${fmtDate(a.fecha)}`;
  window.print();
}

// ── DASHBOARD ────────────────────────────────────────────────
function renderDash(){
  const real=activities.filter(a=>a.estado==='realizada');
  const totalAsis=real.reduce((s,a)=>s+Number(a.asistentes||0),0);
  const comunidades=[...new Set(real.map(a=>a.comunidad).filter(Boolean))].length;
  const proximas=activities.filter(a=>a.estado!=='realizada'&&new Date(normalizeDate(a.fecha)+'T12:00:00')>=new Date()).length;
  document.getElementById('metric-grid').innerHTML=`
    <div class="metric-card"><div class="metric-val">${real.length}</div><div class="metric-lbl">Actividades realizadas</div></div>
    <div class="metric-card"><div class="metric-val">${totalAsis}</div><div class="metric-lbl">Participantes totales</div></div>
    <div class="metric-card"><div class="metric-val">${comunidades}</div><div class="metric-lbl">Comunidades alcanzadas</div></div>
    <div class="metric-card"><div class="metric-val">${proximas}</div><div class="metric-lbl">Actividades próximas</div></div>`;
  const bar=(id,data,colorFn)=>{const max=Math.max(...Object.values(data),1);document.getElementById(id).innerHTML=Object.entries(data).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="bar-row"><div class="bar-label">${k.split(' ').slice(0,3).join(' ')}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%;background:${colorFn(k)}"></div></div><div class="bar-val">${v}</div></div>`).join('');};
  const pie=(id,data,colors)=>{const total=Math.max(Object.values(data).reduce((s,v)=>s+v,0),1);document.getElementById(id).innerHTML=Object.entries(data).sort((a,b)=>b[1]-a[1]).map(([k,v],i)=>`<div class="pie-row"><div class="pie-dot" style="background:${colors[i%colors.length]}"></div><div class="pie-label">${k}</div><div class="pie-pct">${Math.round(v/total*100)}%</div></div>`).join('');};
  const countA=(key)=>real.reduce((acc,a)=>{const k=a[key];if(k)acc[k]=(acc[k]||0)+Number(a.asistentes||1);return acc;},{});
  const countN=(key)=>real.reduce((acc,a)=>{const k=a[key];if(k)acc[k]=(acc[k]||0)+1;return acc;},{});
  bar('chart-tipo',countA('tipo'),k=>COLORS[k]||'#888');
  bar('chart-comunidad',countN('comunidad'),()=>'#4064AB');
  pie('chart-tematica',countN('tematica'||'area'),['#4064AB','#1D9E75','#BA7517','#E8593C','#9FB6DF','#534AB7']);
  pie('chart-rol',countA('rol'),['#243882','#4064AB','#9FB6DF','#E8593C','#1D9E75']);
  const tl=document.getElementById('dash-timeline');tl.innerHTML='';
  [...real].sort((a,b)=>normalizeDate(b.fecha).localeCompare(normalizeDate(a.fecha))).slice(0,8).forEach(a=>{
    const color=COLORS[a.tipo]||'#888';
    const item=document.createElement('div');item.className='tl-item';
    item.innerHTML=`<div class="tl-dot" style="background:${color}22;color:${color}"><i class="ti ${ICONS[a.tipo]||'ti-calendar'}"></i></div><div class="tl-body"><div class="tl-title">${a.nombre}</div><div class="tl-meta">${fmtDate(a.fecha)} · ${a.comunidad||'—'}</div><div class="tl-stats"><span class="tl-stat"><i class="ti ti-users"></i>${a.asistentes}</span><span class="tl-stat"><i class="ti ti-book"></i>${a.tematica||a.area||'—'}</span>${a.alianza?`<span class="tl-stat"><i class="ti ti-building"></i>${a.alianza.split('(')[0].trim()}</span>`:''}</div></div>`;
    tl.appendChild(item);
  });
}

// ── LISTENERS & INIT ─────────────────────────────────────────
document.getElementById('modal-backdrop').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('asist-backdrop').addEventListener('click',function(e){if(e.target===this)closeAsistencia();});

(async()=>{
  await loadAll(true);
})();
</script>
</body>
</html>
